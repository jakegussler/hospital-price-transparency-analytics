name: hospital_price_transparency
version: "0.1.0"
config-version: 2

profile: hospital_price_transparency

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  hpt_silver_retention_mode: "{{ env_var('HPT_SILVER_RETENTION_MODE', 'current_only') }}"
  # Off by default: production hospitals dimension is the registry seed only. The
  # multi-snapshot validation workflow sets HPT_INCLUDE_VALIDATION_FIXTURES=true
  # to union the fictional fixture hospitals into slv_base__hospitals so the
  # service-item referential test passes. See
  # docs/development/multi-snapshot-validation.md.
  hpt_include_validation_fixtures: "{{ env_var('HPT_INCLUDE_VALIDATION_FIXTURES', 'false') }}"

models:
  hospital_price_transparency:
    staging:
      +materialized: view
      +tags: ["staging"]
      reference:
        +tags: ["staging", "reference"]
      stg_bronze__hospital_mrf_snapshots:
        +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
      stg_bronze__hospital_locations:
        +tags: ["pipeline_snapshot_metadata"]
      stg_bronze__type2_npi:
        +tags: ["pipeline_snapshot_metadata"]
      stg_bronze__general_contract_provisions:
        +tags: ["pipeline_snapshot_metadata"]
      stg_bronze__standard_charge_info:
        +tags: ["pipeline_charge_data"]
      stg_bronze__code_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__drug_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__standard_charges:
        +tags: ["pipeline_charge_data"]
      stg_bronze__standard_charge_modifiers:
        +tags: ["pipeline_charge_data"]
      stg_bronze__payers_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__json_record_parse_diagnostics:
        +tags: ["pipeline_charge_data"]
      stg_bronze__modifiers:
        +tags: ["pipeline_charge_data"]
      stg_bronze__modifier_payer_info:
        +tags: ["pipeline_charge_data"]
      stg_bronze__csv_charge_rows:
        +tags: ["pipeline_charge_data"]
    silver:
      +materialized: incremental
      +incremental_strategy: snapshot_replace
      +unique_key: snapshot_id
      +on_schema_change: append_new_columns
      base:
        +tags: ["silver_base", "silver"]
        slv_base__hospitals:
          +materialized: table
          +incremental_strategy: null
          +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
        slv_base__hospital_snapshots:
          +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
        slv_base__hospital_locations:
          +tags: ["pipeline_snapshot_metadata"]
        slv_base__type2_npis:
          +tags: ["pipeline_snapshot_metadata"]
        slv_base__general_contract_provisions:
          +tags: ["pipeline_snapshot_metadata"]
        slv_base__csv_charge_row_items:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_items:
          +tags: ["pipeline_charge_data"]
        slv_base__standard_charges:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_item_codes:
          +tags: ["pipeline_charge_data"]
        slv_base__drug_information:
          +tags: ["pipeline_charge_data"]
        slv_base__payer_rates:
          +tags: ["pipeline_charge_data"]
        slv_base__modifiers:
          +tags: ["pipeline_charge_data"]
        slv_base__modifier_payer_info:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_modifiers:
          +tags: ["pipeline_charge_data"]
      core:
        +tags: ["silver_core", "silver"]
        slv_core__payer_alias_matches:
          +incremental_strategy: null
        slv_core__payer_context_matches:
          +incremental_strategy: null
        slv_core__rate_modifier_signature:
          +incremental_strategy: null
        slv_core__service_items:
          +incremental_strategy: null
      reference:
        # Externally-sourced code descriptions; not snapshot-grained.
        +materialized: table
        +incremental_strategy: null
        +tags: ["silver_core", "silver"]
      review_queue:
        +materialized: table
        +incremental_strategy: null
        +tags: ["silver_review_queue", "silver"]
      audit:
        +materialized: view
        +incremental_strategy: null
        +tags: ["silver_audit", "silver"]
    validation:
      +schema: validation
      +materialized: incremental
      +incremental_strategy: snapshot_replace
      +unique_key: snapshot_id
      +on_schema_change: append_new_columns
      +tags: ["validation"]
      violations:
        +tags: ["pipeline_charge_data"]
        # Normalized charge/code grain that the violation models scan once per
        # rule. Materialized as a plain table (rebuilt to the current run scope)
        # so the heavy JSON+CSV union/unpivot is computed once instead of being
        # recomputed per rule branch.
        intermediate:
          +materialized: table
          +incremental_strategy: null
          +unique_key: null
          +on_schema_change: ignore
      rejections:
        +tags: ["pipeline_charge_data"]
      stats:
        +tags: ["pipeline_charge_data"]
        val__rule_coverage:
          +materialized: table
          +incremental_strategy: null
        val_stats__rule_summary:
          +materialized: table
          +incremental_strategy: null
    audit:
      +schema: audit
      +materialized: view
      +tags: ["audit"]
      staging:
        +tags: ["audit_staging"]
      marts:
        +tags: ["audit_marts"]
    gold:
      +materialized: incremental
      +incremental_strategy: snapshot_replace
      +unique_key: snapshot_id
      +on_schema_change: append_new_columns
      +tags: ["gold"]
      +schema: gold
      core:
        +tags: ["gold_core", "gold"]
        gld_fct__rate_observations: { +tags: ["gold_per_snapshot"] }
        gld_bridge__rate_observation_code: { +tags: ["gold_per_snapshot"] }
        # Conformed dimensions are full-refresh tables read UNscoped (plain ref)
        gld_dim__snapshot: { +materialized: table, +incremental_strategy: null, +tags: ["gold_dimension"] }
        gld_dim__payer: { +materialized: table, +incremental_strategy: null, +tags: ["gold_dimension"] }
        gld_dim__service_code: { +materialized: table, +incremental_strategy: null, +tags: ["gold_dimension"] }
        gld_dim__modifier_signature: { +materialized: table, +incremental_strategy: null, +tags: ["gold_dimension"] }
        gld_dim__hospital: { +materialized: table, +incremental_strategy: null, +tags: ["gold_dimension"] }
      marts:
        +materialized: table
        +incremental_strategy: null
        # Marts read the completed fact + dimensions unscoped and are built once
        # at the end of the per-snapshot full-refresh workflow.
        +tags: ["gold_marts", "gold"]
      scorecards:
        +materialized: table
        +incremental_strategy: null
        # Scorecards read the completed fact + bridge (+ coverage scorecard)
        # unscoped and are built once after the marts.
        +tags: ["gold_scorecards", "gold"]

seeds:
  hospital_price_transparency:
    +schema: seeds
    states:
      +column_types:
        state_code: varchar
        state_name: varchar
        state_type: varchar
        census_region: varchar
        census_division: varchar
        is_50_state: boolean
        is_cms_accepted: boolean
    cms_validation_rules:
      +column_types:
        rule_id: varchar
        rule_name: varchar
        description: varchar
        cms_citation: varchar
        grain: varchar
        fields: varchar
        schema_families: varchar
        condition: varchar
        severity: varchar
        applies_to_formats: varchar
        target_dbt_model: varchar
        notes: varchar
        disposition: varchar
    cms_code_types:
      +column_types:
        code_type: varchar
        cms_code_type: varchar
        standard_name: varchar
        valid_in_2_1: boolean
        valid_in_2_2: boolean
        valid_in_3_0: boolean
        requires_drug_information: boolean
    payer_context_rules:
      +column_types:
        plan_type: varchar
    modifier_reference:
      +column_types:
        modifier_code: varchar
        modifier_class: varchar
        modifier_meaning: varchar
        affects_pro_tech_split: boolean
        modifier_category: varchar
        evidence_source: varchar
        notes: varchar
    drug_unit_aliases:
      +column_types:
        raw_unit_code: varchar
        clean_unit_code: varchar
        canonical_unit: varchar
        unit_group: varchar
        notes: varchar
    fixtures:
      # Fictional test hospitals for multi-snapshot validation only. Kept out of
      # the registry-faithful `hospitals` seed; unioned into slv_base__hospitals
      # solely when hpt_include_validation_fixtures is true. Exclude from a run
      # with `--exclude tag:validation_fixtures` if desired.
      +tags: ["validation_fixtures"]
