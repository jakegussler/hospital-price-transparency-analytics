name: hospital_price_transparency
version: "0.1.0"
config-version: 2

profile: hospital_price_transparency

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  hospital_price_transparency:
    staging:
      +materialized: view
      +tags: ["staging"]
      stg_bronze__hospital_mrf_snapshots:
        +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
      stg_bronze__hospital_locations:
        +tags: ["pipeline_snapshot_metadata"]
      stg_bronze__type2_npi:
        +tags: ["pipeline_snapshot_metadata"]
      stg_bronze__standard_charge_info:
        +tags: ["pipeline_charge_data"]
      stg_bronze__code_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__drug_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__standard_charges:
        +tags: ["pipeline_charge_data"]
      stg_bronze__standard_charge_modifiers:
        +tags: ["pipeline_charge_data"]
      stg_bronze__payers_information:
        +tags: ["pipeline_charge_data"]
      stg_bronze__json_record_parse_diagnostics:
        +tags: ["pipeline_charge_data"]
      stg_bronze__modifiers:
        +tags: ["pipeline_charge_data"]
      stg_bronze__modifier_payer_info:
        +tags: ["pipeline_charge_data"]
      stg_bronze__csv_charge_rows:
        +tags: ["pipeline_charge_data"]
    silver:
      +materialized: table
      base:
        +tags: ["silver_base", "silver"]
        slv_base__hospitals:
          +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
        slv_base__hospital_snapshots:
          +tags: ["pipeline_snapshot_metadata", "pipeline_charge_data"]
        slv_base__hospital_locations:
          +tags: ["pipeline_snapshot_metadata"]
        slv_base__type2_npis:
          +tags: ["pipeline_snapshot_metadata"]
        slv_base__csv_charge_row_items:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_items:
          +tags: ["pipeline_charge_data"]
        slv_base__standard_charges:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_item_codes:
          +tags: ["pipeline_charge_data"]
        slv_base__payer_rates:
          +tags: ["pipeline_charge_data"]
        slv_base__modifiers:
          +tags: ["pipeline_charge_data"]
        slv_base__charge_modifiers:
          +tags: ["pipeline_charge_data"]
      core:
        +tags: ["silver_core", "silver"]
    validation:
      +schema: validation
      +materialized: table
      +tags: ["validation", "data_quality"]
      violations:
        +tags: ["pipeline_charge_data"]
      rejections:
        +tags: ["pipeline_charge_data"]
      stats:
        +tags: ["pipeline_charge_data"]

seeds:
  hospital_price_transparency:
    +schema: seeds
    states:
      +column_types:
        state_code: varchar
        state_name: varchar
        state_type: varchar
        census_region: varchar
        census_division: varchar
        is_50_state: boolean
        is_cms_accepted: boolean
    cms_validation_rules:
      +column_types:
        rule_id: varchar
        rule_name: varchar
        description: varchar
        cms_citation: varchar
        grain: varchar
        fields: varchar
        schema_families: varchar
        condition: varchar
        severity: varchar
        applies_to_formats: varchar
        current_pydantic_location: varchar
        target_dbt_model: varchar
        notes: varchar
    cms_code_types:
      +column_types:
        code_type: varchar
        cms_code_type: varchar
        standard_name: varchar
        valid_in_2_1: boolean
        valid_in_2_2: boolean
        valid_in_3_0: boolean
        requires_drug_information: boolean
    payer_context_rules:
      +column_types:
        plan_type: varchar
