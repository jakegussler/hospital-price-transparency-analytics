selectors:
  - name: staging
    description: "Staging models over Bronze source tables."
    definition:
      method: tag
      value: staging

  - name: silver_base
    description: "Silver base models."
    definition:
      method: tag
      value: silver_base

  - name: silver_core
    description: "Silver core models."
    definition:
      method: tag
      value: silver_core
  
  - name: silver_review_queue
    description: "Silver review queue models."
    definition:
      method: tag
      value: silver_review_queue

  - name: silver_audit
    description: "Silver data-quality audit finding views."
    definition:
      method: tag
      value: silver_audit

  - name: silver
    description: "All Silver models: base, core, review queue, and audit findings."
    definition:
      method: tag
      value: silver

  - name: pipeline_snapshot_metadata
    description: "Snapshot metadata models across staging and Silver."
    definition:
      method: tag
      value: pipeline_snapshot_metadata

  - name: pipeline_charge_data
    description: "Charge-data models across staging and Silver."
    definition:
      method: tag
      value: pipeline_charge_data

  - name: gold_core
    description: "Gold conformed dimensions, the rate-observation fact, and the code bridge."
    definition:
      method: tag
      value: gold_core

  - name: gold_marts
    description: "Gold analytical marts."
    definition:
      method: tag
      value: gold_marts

  - name: gold_scorecards
    description: >
      Gold coverage and transparency scorecards. Full-refresh tables read
      unscoped from the completed fact, bridge, and dimensions; built once after
      the marts in the per-snapshot workflow.
    definition:
      method: tag
      value: gold_scorecards

  - name: gold_bi
    description: >
      Gold BI presentation marts. Full-refresh tables read unscoped from the
      completed Gold marts, scorecards, and dimensions; built once after marts
      and scorecards.
    definition:
      method: tag
      value: gold_bi

  - name: gold
    description: "All Gold models: core, marts, scorecards, and BI presentation marts."
    definition:
      method: tag
      value: gold

  - name: gold_dimension
    description: >
      Conformed Gold dimensions only (gld_dim__hospital, gld_dim__snapshot,
      gld_dim__payer, gld_dim__service_code, gld_dim__modifier_signature).
      Full-refresh tables read unscoped
      from Silver so they span every snapshot. Built once after the per-snapshot
      Silver pass completes and before the per-snapshot Gold fact so the fact's
      relationships tests against the dimensions can pass.
    definition:
      method: tag
      value: gold_dimension

  - name: gold_per_snapshot
    description: >
      Snapshot-grained Gold models built per snapshot: the rate-observation fact
      (gld_fct__rate_observations) and the code bridge
      (gld_bridge__rate_observation_code). They read inputs through
      hpt_scoped_ref and use the snapshot_replace incremental strategy, so the
      per-snapshot full-refresh workflow full-refreshes the first snapshot and
      appends the rest. Excludes the conformed dimensions and marts, which are
      run-once models built unscoped.
    definition:
      method: tag
      value: gold_per_snapshot

  - name: per_snapshot
    description: >
      All standard per-snapshot Silver/staging/validation pipeline models,
      excluding operational audit models and Gold. Gold models are built in
      their own dedicated passes in the per-snapshot full-refresh workflow: the
      snapshot-grained fact and bridge (selector gold_per_snapshot) and the
      run-once dimensions, marts, scorecards, and BI presentation tables
      (selectors gold_dimension, gold_marts, gold_scorecards, and gold_bi).
    definition:
      union:
        - method: path
          value: models
        - exclude:
            - method: path
              value: models/audit
            - method: tag
              value: gold

  - name: validation
    description: "Validation models, rejection keysets, and validation statistics."
    definition:
      union:
        - method: tag
          value: staging
        - method: tag
          value: validation

  - name: audit
    description: "All operational audit staging and mart models."
    definition:
      method: tag
      value: audit

  - name: audit_staging
    description: "Source-faithful operational audit staging models."
    definition:
      method: tag
      value: audit_staging

  - name: audit_marts
    description: "Operational audit marts."
    definition:
      method: tag
      value: audit_marts

  - name: charge_modifier_regrain
    description: >
      Exactly the models affected by re-graining slv_base__charge_modifiers to
      standard-charge grain: the modifier models, the standard_charges parent
      (which gained raw_modifiers), the payer-rate model (whose inlined ephemeral
      modifier signature recompiled), and the modifier review queue (whose counts
      shift). Lets you refresh only these per snapshot without rebuilding base or
      core wholesale. Safe to delete once every snapshot has been re-run.
    definition:
      union:
        - method: fqn
          value: slv_base__standard_charges
        - method: fqn
          value: slv_base__charge_modifiers
        - method: fqn
          value: slv_core__charge_modifiers
        - method: fqn
          value: slv_core__payer_rates
        - method: fqn
          value: slv_review_queue__modifier_candidates
