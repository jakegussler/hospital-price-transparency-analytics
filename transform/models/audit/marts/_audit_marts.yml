version: 2

models:
  - name: audit__runs
    description: "One row per audited command invocation, resolved to its latest terminal state."
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
      - name: terminal_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["success", "partial", "failed", "running_or_interrupted"]

  - name: audit__attempts
    description: "One row per audit attempt enriched with its parent command and terminal status."
    columns:
      - name: attempt_id
        tests:
          - not_null
          - unique
      - name: run_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('audit__runs')
                field: run_id
      - name: run_command
        tests:
          - not_null
      - name: run_terminal_status
        tests:
          - not_null

  - name: audit__attempt_stages
    description: "One row per attempt and named pipeline stage, combining stage status and elapsed time."
    columns:
      - name: attempt_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('audit__attempts')
                field: attempt_id
      - name: stage_name
        tests:
          - not_null

  - name: audit__attempt_row_counts
    description: "One row per attempt, count type, and output table reported by ingest."
    columns:
      - name: attempt_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('audit__attempts')
                field: attempt_id
      - name: count_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["bronze", "quarantine"]
      - name: table_name
        tests:
          - not_null
      - name: row_count
        tests:
          - not_null

  - name: audit__node_results
    description: "One row per dbt node per invocation: per-model timing, status, and row counts, enriched with invoke and run context. Grain: one row per (attempt_id, node_unique_id)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - attempt_id
              - node_unique_id
    columns:
      - name: attempt_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('audit__attempts')
                field: attempt_id
      - name: node_unique_id
        tests:
          - not_null
      - name: run_command
        tests:
          - not_null
      - name: row_count_semantics
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  ["rebuilt_table_rows", "rows_written_this_run", "not_applicable", "use_test_failures", "rows_seeded", "unknown"]
