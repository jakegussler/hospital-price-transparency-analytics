version: 2

models:
  - name: stg_audit__run_events
    description: "Source-faithful started and completed state events for audited commands."
    columns:
      - name: run_id
        tests:
          - not_null
      - name: run_date
        tests:
          - not_null
      - name: state
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["started", "completed"]
      - name: command
        tests:
          - not_null

  - name: stg_audit__attempts
    description: "Source-faithful records for concrete download, ingest, and dbt attempts."
    columns:
      - name: run_id
        tests:
          - not_null
      - name: attempt_id
        tests:
          - not_null
          - unique
      - name: attempt_ordinal
        tests:
          - not_null
      - name: attempt_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["download", "ingest", "dbt"]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["success", "failed"]

  - name: stg_audit__node_results
    description: "Source-faithful per-node dbt results harvested from the in-process dbtRunner."
    columns:
      - name: run_id
        tests:
          - not_null
      - name: attempt_id
        tests:
          - not_null
      - name: node_unique_id
        tests:
          - not_null
      - name: node_status
        tests:
          - not_null
          # Union of dbt RunStatus (models/seeds) and TestStatus (tests). Warn,
          # not error: this is source-faithful and new dbt statuses should not
          # break the build.
          - accepted_values:
              config:
                severity: warn
              arguments:
                values:
                  ["success", "error", "skipped", "partial success", "no-op", "pass", "fail", "warn"]
