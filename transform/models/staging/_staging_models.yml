version: 2

models:
  - name: stg_bronze__hospital_mrf_snapshots
    description: "Typed, lightly cleaned staging view over Bronze snapshot metadata."
    columns:
      - name: snapshot_id
        tests:
          - not_null
          - unique
      - name: hospital_id
        tests:
          - not_null
      - name: source_format
        tests:
          - accepted_values:
              values: ["json", "csv_tall", "csv_wide"]

  - name: stg_bronze__hospital_locations
    description: "Staging view for source-reported hospital locations."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: location_ordinal
        tests:
          - not_null

  - name: stg_bronze__type2_npi
    description: "Staging view for source-reported type-2 NPIs."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: npi_ordinal
        tests:
          - not_null

  - name: stg_bronze__general_contract_provisions
    description: >
      Staging view for optional aggregate-level payer contract provisions
      (JSON array objects or the flat CSV General Data Element column).
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: provision_ordinal
        tests:
          - not_null

  - name: stg_bronze__standard_charge_info
    description: "Staging view for JSON standard charge item parents."
    columns:
      - name: charge_item_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - not_null
      - name: parser_schema_family
        tests:
          - accepted_values:
              arguments:
                values: ["2.1", "2.2", "3.0"]
      - name: reported_schema_family
        tests:
          - accepted_values:
              arguments:
                values: ["2.1", "2.2", "3.0"]

  - name: stg_bronze__code_information
    description: "Staging view for JSON billing codes attached to charge items."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: charge_item_id
        tests:
          - not_null

  - name: stg_bronze__standard_charges
    description: "Staging view for JSON standard charge rows."
    columns:
      - name: standard_charge_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - not_null

  - name: stg_bronze__payers_information
    description: "Staging view for JSON payer-specific rate rows."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: standard_charge_id
        tests:
          - not_null

  - name: stg_bronze__json_record_parse_diagnostics
    description: "Staging view for JSON records quarantined before Bronze row fanout."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: parser_schema_family
        tests:
          - accepted_values:
              arguments:
                values: ["2.1", "2.2", "3.0"]

  - name: stg_bronze__standard_charge_modifiers
    description: "Staging view for optional JSON charge-level modifier codes."
    columns:
      - name: standard_charge_id
        tests:
          - not_null

  - name: stg_bronze__csv_charge_rows
    description: "Staging view for CSV Tall/Wide charge rows with source lineage and dynamic code columns preserved."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: row_ordinal
        tests:
          - not_null
      - name: source_rate_ordinal
        tests:
          - not_null

  - name: stg_bronze__csv_modifier_rows
    description: "One row per original CSV source row with modifier classification and canonical full-combination values."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: row_ordinal
        tests:
          - not_null
      - name: clean_modifier_combination
        description: "Ordered nonblank cleaned modifier members joined with a pipe."

  - name: stg_bronze__csv_modifier_members
    description: "Ordered nonblank modifier members from each original CSV source-row declaration."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: row_ordinal
        tests:
          - not_null
      - name: member_ordinal
        tests:
          - not_null

  - name: stg_bronze__csv_numeric_parse_diagnostics
    description: >
      Malformed numeric values from CSV Bronze. CSV Bronze stores
      numeric-looking cells as raw text; this model emits one row per non-empty
      raw value that fails the same hpt_safe_decimal / hpt_safe_double cast that
      staging applies, so bad numbers are queryable instead of silently becoming
      null. Populated sentinel literals such as N/A and - are diagnosed rather
      than treated as missing. Item-level columns repeat across payer groups
      after CSV Wide unpivoting and are deduped without payer/plan; payer-level
      columns carry payer/plan.
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: row_ordinal
        tests:
          - not_null
      - name: column_name
        tests:
          - not_null
      - name: raw_value
        tests:
          - not_null
      - name: diagnostic_type
        tests:
          - accepted_values:
              values: ["numeric_cast_failed"]
