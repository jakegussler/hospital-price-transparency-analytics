version: 2

# Bronze sources are Parquet files written by ``hpt.loaders.parquet.BronzeWriter``.
# Each table lives under ``{bronze_root}/{table}/snapshot_id={id}/part-NNN.parquet``.
# The dbt-duckdb adapter substitutes ``{name}`` with the table name and uses
# ``external_location`` as the target for ``SELECT`` statements against the
# source reference.
#
# See: https://github.com/duckdb/dbt-duckdb#reading-and-writing-external-files
sources:
  - name: bronze
    description: "Raw, source-faithful Parquet tables produced by the HPT ingest pipeline."
    meta:
      external_location: "read_parquet('{{ env_var('HPT_BRONZE_ROOT', '../data/bronze') }}/{name}/**/*.parquet', hive_partitioning=true, union_by_name=true)"
    tables:
      # ---- Shared across all formats ------------------------------------
      - name: hospital_mrf_snapshots
        description: "One row per ingested MRF file; header + pipeline metadata."
        columns:
          - name: snapshot_id
            description: "Unique identifier for the snapshot."
            tests:
              - not_null
              - unique
          - name: hospital_id
            description: "Registry identifier for the hospital."
            tests:
              - not_null
          - name: ingested_at
            description: "Timestamp when the MRF was ingested."
            tests:
              - not_null

      - name: hospital_locations
        description: "Physical locations reported in the MRF header."
        columns:
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null
          - name: location_ordinal
            description: "0-based index of the location within the MRF header array."
            tests:
              - not_null

      - name: type2_npi
        description: "Type-2 NPIs reported in the MRF header."
        columns:
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null
          - name: npi_ordinal
            description: "0-based index of the NPI within the MRF header array."
            tests:
              - not_null

      - name: general_contract_provisions
        description: >
          Optional aggregate/claim-level payer contract provisions. JSON emits
          one row per ``general_contract_provisions[]`` object (with optional
          payer/plan); CSV emits a single row from the flat
          ``general_contract_provisions`` General Data Element column. Parsed
          source-faithfully so a missing/blank ``provisions`` reaches the dbt
          validation layer.
        columns:
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null
          - name: provision_ordinal
            description: "0-based index of the provision within the MRF (0 for CSV)."
            tests:
              - not_null

      # ---- JSON-only tables --------------------------------------------
      - name: standard_charge_info
        description: "One row per entry in the source standard_charge_information array."
        columns:
          - name: charge_item_id
            description: "Unique identifier for the charge item (snapshot_id + ordinal)."
            tests:
              - not_null
              - unique
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      - name: code_information
        description: "Billing codes attached to a charge item."
        columns:
          - name: charge_item_id
            description: "FK to standard_charge_info."
            tests:
              - not_null
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      - name: drug_information
        description: "Drug unit metadata; 1:1 with standard_charge_info when present."

      - name: standard_charges
        description: "One row per payer-setting charge record within a charge item."
        columns:
          - name: standard_charge_id
            description: "Unique identifier for a standard charge row."
            tests:
              - not_null
              - unique
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      - name: standard_charge_modifiers
        description: "Raw modifier code strings applied to a standard charge (not a resolved FK)."

      - name: payers_information
        description: "Payer/plan rate records within a standard charge."
        columns:
          - name: standard_charge_id
            description: "FK to standard_charges."
            tests:
              - not_null
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      - name: json_record_parse_diagnostics
        description: "Structural diagnostics for JSON records quarantined before they can be exploded into Bronze rows."

      - name: modifiers
        description: "Top-level modifier dimension from JSON ``modifier_information``."
        columns:
          - name: modifier_code_id
            description: "Unique identifier for the modifier (snapshot_id + ordinal)."
            tests:
              - not_null
              - unique
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      - name: modifier_payer_info
        description: "Payer/plan rate records within a modifier definition."
        columns:
          - name: modifier_code_id
            description: "FK to modifiers."
            tests:
              - not_null
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null

      # ---- CSV-only tables ---------------------------------------------
      - name: csv_charge_rows
        description: >
          One row per source CSV charge row after CSV Tall parsing or CSV Wide
          payer-column unpivoting. Code columns are dynamic per source file and
          are emitted as code_N / code_N_type pairs.
        columns:
          - name: snapshot_id
            description: "FK to hospital_mrf_snapshots."
            tests:
              - not_null
          - name: row_ordinal
            description: "0-based source CSV row position within the file."
            tests:
              - not_null
