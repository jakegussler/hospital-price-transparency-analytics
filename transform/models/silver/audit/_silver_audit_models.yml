version: 2

models:
  - name: slv_audit__service_item_overmerge
    description: >
      Over-merge findings for the deterministic service-item identity:
      specific_code-basis service_item_ids whose key absorbs more than one
      description or source item, ranked by within-snapshot description
      spread (the regression signal; cross-snapshot drift is the design
      working as intended). These are findings for humans to read — there is
      no accept/reject workflow because item identity is algorithmic, not
      curated.
    columns:
      - name: service_item_id
        description: "The flagged within-hospital service-item identity."
      - name: max_snapshot_distinct_descriptions
        description: "Largest number of distinct clean descriptions the ID absorbs inside a single snapshot. Values above 1 are token-equal variants; sustained growth indicates a signature regression."
      - name: max_snapshot_source_items
        description: "Largest number of distinct Silver Base items rolled into the ID inside a single snapshot."

  - name: slv_audit__code_validation_findings
    description: >
      Code-quality findings from the Silver Core code enrichment, aggregated
      by hospital, code system, and status over current snapshots. Excludes
      the not_validated status on purpose: CDM/LOCAL systems have no
      canonical format and would flood the findings. Complements the
      code-system review queue, which only covers unresolved system labels.
    columns:
      - name: code_system
        description: "Canonical code system when resolved, otherwise the clean label, otherwise '<missing>'."
      - name: code_rows
        description: "Offending code rows for this hospital/system/status combination."

  - name: slv_audit__plan_context_coverage
    description: >
      Plan / payer-context coverage metrics by canonical payer over current
      snapshots (Phase 3 of the plan-normalization design). Reports how much
      of the payer-rate corpus carries a resolved market_segment and a
      populated plan_type, and how each plan_type was resolved (curated rule
      vs. deterministic derivation). A human-readable observability view, not
      a review queue: slv_review_queue__plan_context_candidates ranks the
      specific payer/plan combos to curate next.
    columns:
      - name: canonical_payer_id
        description: "Broad canonical payer identity; '<unmatched_payer>' aggregates rows with no resolved payer."
        tests:
          - not_null
      - name: payer_rate_rows
        description: "Total current payer-rate rows for this canonical payer."
        tests:
          - not_null
      - name: pct_market_segment_resolved
        description: "Share of rows whose market_segment is not 'unknown'."
      - name: pct_plan_type_populated
        description: "Share of rows with a non-null plan_type (rule-supplied or derived)."
      - name: plan_type_derived_rows
        description: "Rows whose plan_type came from the deterministic token derivation rather than a curated rule."
