version: 2

models:
  - name: slv_audit__service_item_overmerge
    description: >
      Over-merge findings for the deterministic service-item identity:
      specific_code-basis service_item_ids whose key absorbs more than one
      description or source item, ranked by within-snapshot description
      spread (the regression signal; cross-snapshot drift is the design
      working as intended). These are findings for humans to read — there is
      no accept/reject workflow because item identity is algorithmic, not
      curated.
    columns:
      - name: service_item_id
        description: "The flagged within-hospital service-item identity."
      - name: max_snapshot_distinct_descriptions
        description: "Largest number of distinct clean descriptions the ID absorbs inside a single snapshot. Values above 1 are token-equal variants; sustained growth indicates a signature regression."
      - name: max_snapshot_source_items
        description: "Largest number of distinct Silver Base items rolled into the ID inside a single snapshot."

  - name: slv_audit__service_item_continuity
    description: >
      Cross-snapshot continuity scorecard for the deterministic service-item
      identity (decision 0014), one row per hospital. Reports how many items
      recur across the snapshots retained for that hospital (continuity), how
      many first appear in the latest snapshot (minted), and how many fall out
      before it (retired / drift-driven churn). This is the s2.4 deliverable
      that makes service_item_id continuity measurable rather than asserted.
      Meaningful only under all_snapshots retention with multi-snapshot
      ingestion; under current_only every hospital holds one snapshot so the
      multi-snapshot and minted/retired counts are 0 by construction.
    columns:
      - name: hospital_id
        description: "Within-hospital scope for the identity (ids never span hospitals)."
        tests:
          - not_null
      - name: hospital_snapshot_count
        description: "Distinct retained snapshots for this hospital. 1 under current_only retention."
      - name: service_item_count
        description: "Distinct service_item_ids for this hospital across retained snapshots."
      - name: multi_snapshot_item_count
        description: "Service items observed in two or more snapshots: the continuity signal."
      - name: pct_items_multi_snapshot
        description: "Share of this hospital's service items that recur across snapshots."
      - name: minted_in_latest_item_count
        description: "Items first seen in the latest snapshot (new items + drift-driven re-mints)."
      - name: retired_before_latest_item_count
        description: "Items last seen before the latest snapshot (dropped items + old id of a re-mint)."

  - name: slv_audit__code_validation_findings
    description: >
      Code-quality findings from the Silver Core code enrichment, aggregated
      by hospital, code system, and status over current snapshots. Excludes
      the not_validated status on purpose: CDM/LOCAL systems have no
      canonical format and would flood the findings. Complements the
      code-system review queue, which only covers unresolved system labels.
    columns:
      - name: code_system
        description: "Canonical code system when resolved, otherwise the clean label, otherwise '<missing>'."
      - name: code_rows
        description: "Offending code rows for this hospital/system/status combination."

  - name: slv_audit__payer_rate_duplicate_context
    description: >
      Duplicate payer/plan context findings over current snapshots: one row per
      comparable rate unit (item + setting + billing class + canonical payer +
      plan + methodology + modifier signature + amount_kind) that repeats inside
      a snapshot. The positional silver_payer_rate_id stays unique, so genuine
      business-grain repeats only surface here. has_conflicting_amounts splits
      redundant duplicate rows (same context and amount) from conflicting rates
      (same context, different negotiated value). Observability, not a review
      queue; paired with the warn-severity core_payer_rate_duplicate_context test.
    columns:
      - name: snapshot_id
        description: "Snapshot the duplicate context belongs to."
        tests:
          - not_null
      - name: duplicate_row_count
        description: "Number of payer-rate rows sharing this comparable rate unit; always greater than 1."
        tests:
          - not_null
      - name: has_conflicting_amounts
        description: "True when the duplicated context carries more than one distinct negotiated value (dollar, percentage, or algorithm)."
        tests:
          - not_null

  - name: slv_audit__plan_context_coverage
    description: >
      Plan / payer-context coverage metrics by canonical payer over current
      snapshots (Phase 3 of the plan-normalization design). Reports how much
      of the payer-rate corpus carries a resolved market_segment and a
      populated plan_type, and how each plan_type was resolved (curated rule
      vs. deterministic derivation). A human-readable observability view, not
      a review queue: slv_review_queue__plan_context_candidates ranks the
      specific payer/plan combos to curate next.
    columns:
      - name: canonical_payer_id
        description: "Broad canonical payer identity; '<unmatched_payer>' aggregates rows with no resolved payer."
        tests:
          - not_null
      - name: payer_rate_rows
        description: "Total current payer-rate rows for this canonical payer."
        tests:
          - not_null
      - name: pct_market_segment_resolved
        description: "Share of rows whose market_segment is not 'unknown'."
      - name: pct_plan_type_populated
        description: "Share of rows with a non-null plan_type (rule-supplied or derived)."
      - name: plan_type_derived_rows
        description: "Rows whose plan_type came from the deterministic token derivation rather than a curated rule."
