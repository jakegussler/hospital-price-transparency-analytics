  - name: charge_items_cross_format_identity_consistency
    description: >
      Fixture coverage for the Option C identity key: a JSON item and a CSV
      item from different snapshots of the same hospital, with identical
      specific codes and a word-order-drifted description, must produce
      identical signatures and the same service_item_id even though their
      categorical revenue codes differ. Also covers the categorical-only and
      uncoded fallback paths, and two drug items differing only in drug_unit
      quantity (deliberately excluded from identity) sharing one ID.
    model: slv_core__charge_items
    given:
      - input: ref('slv_base__charge_items')
        rows:
          - {silver_charge_item_id: item-json-ct, snapshot_id: snap-1, hospital_id: hosp-1, source_format: json, clean_description: "CT ABDOMEN W/CONTRAST"}
          - {silver_charge_item_id: item-csv-ct, snapshot_id: snap-2, hospital_id: hosp-1, source_format: csv_tall, clean_description: "CT W/CONTRAST ABDOMEN"}
          - {silver_charge_item_id: item-cat, snapshot_id: snap-1, hospital_id: hosp-1, source_format: json, clean_description: "CLINIC VISIT LEVEL 1"}
          - {silver_charge_item_id: item-unc, snapshot_id: snap-1, hospital_id: hosp-1, source_format: json, clean_description: "MISC SUPPLY"}
          - {silver_charge_item_id: item-drug-1, snapshot_id: snap-1, hospital_id: hosp-1, source_format: json, clean_description: "AMOXICILLIN 500 MG CAP", drug_unit: 1, clean_drug_unit_type: ea}
          - {silver_charge_item_id: item-drug-2, snapshot_id: snap-2, hospital_id: hosp-1, source_format: csv_tall, clean_description: "AMOXICILLIN 500 MG CAP", drug_unit: 10, clean_drug_unit_type: ea}
      - input: ref('slv_core__charge_item_codes')
        rows:
          - {silver_charge_item_id: item-json-ct, match_code: "74160", canonical_code_system: cpt, clean_code_type: cpt, code_is_specific: true}
          - {silver_charge_item_id: item-json-ct, match_code: "0452", canonical_code_system: rc, clean_code_type: rc, code_is_specific: false}
          - {silver_charge_item_id: item-csv-ct, match_code: "74160", canonical_code_system: cpt, clean_code_type: cpt, code_is_specific: true}
          - {silver_charge_item_id: item-csv-ct, match_code: "0450", canonical_code_system: rc, clean_code_type: rc, code_is_specific: false}
          - {silver_charge_item_id: item-cat, match_code: "0510", canonical_code_system: rc, clean_code_type: rc, code_is_specific: false}
          - {silver_charge_item_id: item-drug-1, match_code: "12345678901", canonical_code_system: ndc, clean_code_type: ndc, code_is_specific: true}
          - {silver_charge_item_id: item-drug-2, match_code: "12345678901", canonical_code_system: ndc, clean_code_type: ndc, code_is_specific: true}
      - input: ref('drug_unit_aliases')
        rows:
          - {raw_unit_code: EA, clean_unit_code: ea, canonical_unit: each, unit_group: count}
    expect:
      rows:
        - {silver_charge_item_id: item-json-ct, description_token_signature: e0d3e748cbdb9f005d8dc74123d6696f, code_signature_specific: ab1b277550644f631d3fd49af7b672dd, code_signature_all: 3172b9bfd26cfdce1dc7bb71ebafe6ff, drug_signature: null, service_item_identity_basis: specific_code, service_item_identity_confidence: high, service_item_id: 2aaeb2cc67e8b2852e6c4029b949636c}
        - {silver_charge_item_id: item-csv-ct, description_token_signature: e0d3e748cbdb9f005d8dc74123d6696f, code_signature_specific: ab1b277550644f631d3fd49af7b672dd, code_signature_all: c3dd9ca8d6eeed49e7eeba5f6dad550b, drug_signature: null, service_item_identity_basis: specific_code, service_item_identity_confidence: high, service_item_id: 2aaeb2cc67e8b2852e6c4029b949636c}
        - {silver_charge_item_id: item-cat, description_token_signature: 06e7ee1d29a9c0b841757fdc531d7774, code_signature_specific: null, code_signature_all: c3bf85991c901e2f462534e9e83e854c, drug_signature: null, service_item_identity_basis: categorical_code, service_item_identity_confidence: medium, service_item_id: 6da820b2602a4a475a57a9d62ac670fa}
        - {silver_charge_item_id: item-unc, description_token_signature: 2e06f5f011e2969663fe3f744f3e778c, code_signature_specific: null, code_signature_all: null, drug_signature: null, service_item_identity_basis: uncoded, service_item_identity_confidence: low, service_item_id: df95060ad941f3a2587e2ff8a433bc9c}
        - {silver_charge_item_id: item-drug-1, description_token_signature: 0141d059c48262b4a76e29286bbacbf2, code_signature_specific: f315472c792d27762937b94dbcabf5e1, code_signature_all: f315472c792d27762937b94dbcabf5e1, drug_signature: 940cde81163ef742db536a54a85dc7d5, service_item_identity_basis: specific_code, service_item_identity_confidence: high, service_item_id: 63ea2d2cb6303d6d11228769f187c325}
        - {silver_charge_item_id: item-drug-2, description_token_signature: 0141d059c48262b4a76e29286bbacbf2, code_signature_specific: f315472c792d27762937b94dbcabf5e1, code_signature_all: f315472c792d27762937b94dbcabf5e1, drug_signature: 940cde81163ef742db536a54a85dc7d5, service_item_identity_basis: specific_code, service_item_identity_confidence: high, service_item_id: 63ea2d2cb6303d6d11228769f187c325}

  - name: service_item_id_hospital_scope_and_mint
    description: >
      Negative-case contract for the derived service_item_id, complementing
      charge_items_cross_format_identity_consistency (which proves drift is
      tolerated). Two items with an identical specific code and identical
      description but different hospital_id must get different ids (the
      within-hospital boundary decision 0014 and Gold rely on), and a
      token-set-changing description rewrite under the same code must mint a new
      id rather than carry continuity. h1 and h2 share code_signature_specific
      and description_token_signature, so only hospital_id separates them.
    model: slv_core__charge_items
    given:
      - input: ref('slv_base__charge_items')
        rows:
          - {silver_charge_item_id: ct-h1, snapshot_id: snap-1, hospital_id: hosp-1, source_format: csv_tall, clean_description: "CT HEAD WITHOUT CONTRAST"}
          - {silver_charge_item_id: ct-h1-rewrite, snapshot_id: snap-2, hospital_id: hosp-1, source_format: csv_tall, clean_description: "CT BRAIN STUDY NONCONTRAST IMAGING"}
          - {silver_charge_item_id: ct-h2, snapshot_id: snap-1, hospital_id: hosp-2, source_format: csv_tall, clean_description: "CT HEAD WITHOUT CONTRAST"}
      - input: ref('slv_core__charge_item_codes')
        rows:
          - {silver_charge_item_id: ct-h1, match_code: "70450", canonical_code_system: cpt, clean_code_type: cpt, code_is_specific: true}
          - {silver_charge_item_id: ct-h1-rewrite, match_code: "70450", canonical_code_system: cpt, clean_code_type: cpt, code_is_specific: true}
          - {silver_charge_item_id: ct-h2, match_code: "70450", canonical_code_system: cpt, clean_code_type: cpt, code_is_specific: true}
      - input: ref('drug_unit_aliases')
        rows:
          - {raw_unit_code: EA, clean_unit_code: ea, canonical_unit: each, unit_group: count}
    expect:
      rows:
        - {silver_charge_item_id: ct-h1, description_token_signature: 4d377965872be5426ea053708e1857cd, code_signature_specific: 2ad6df180192a61e750f00d220586180, service_item_identity_basis: specific_code, service_item_id: abc4147792015f333f8114682b81e10c}
        - {silver_charge_item_id: ct-h1-rewrite, description_token_signature: c828f33b216a832896b8bf32362a80b5, code_signature_specific: 2ad6df180192a61e750f00d220586180, service_item_identity_basis: specific_code, service_item_id: af0ab7a27636a2542012e630ef9f2045}
        - {silver_charge_item_id: ct-h2, description_token_signature: 4d377965872be5426ea053708e1857cd, code_signature_specific: 2ad6df180192a61e750f00d220586180, service_item_identity_basis: specific_code, service_item_id: b13402f8a02fa1d1928680258e977c9c}

  - name: service_items_cross_snapshot_continuity
    description: >
      Continuity fixture for the cross-snapshot dimension: the same
      service_item_id appearing in two snapshots of one hospital with a
      drifted description rolls up to one row with snapshot_count 2, correct
      first/last seen lineage, and the most recent description as
      representative. Real-data continuity validation is pending
      multi-snapshot ingestion; this fixture is the correctness contract.
    model: slv_core__service_items
    given:
      - input: ref('slv_core__charge_items')
        rows:
          - {service_item_id: svc-1, hospital_id: hosp-1, snapshot_id: snap-1, silver_charge_item_id: item-a, clean_description: "CT ABDOMEN W CONTRAST", service_item_identity_basis: specific_code, service_item_identity_confidence: high, code_signature_specific: sig-s1, code_signature_all: sig-a1}
          - {service_item_id: svc-1, hospital_id: hosp-1, snapshot_id: snap-2, silver_charge_item_id: item-b, clean_description: "CT W CONTRAST ABDOMEN", service_item_identity_basis: specific_code, service_item_identity_confidence: high, code_signature_specific: sig-s1, code_signature_all: sig-a2}
          - {service_item_id: svc-2, hospital_id: hosp-1, snapshot_id: snap-2, silver_charge_item_id: item-c, clean_description: "MISC SUPPLY", service_item_identity_basis: categorical_code, service_item_identity_confidence: medium, code_signature_all: sig-a3}
      - input: ref('slv_base__hospital_snapshots')
        rows:
          - {snapshot_id: snap-1, hospital_id: hosp-1, valid_from: "2025-01-01 00:00:00"}
          - {snapshot_id: snap-2, hospital_id: hosp-1, valid_from: "2025-06-01 00:00:00"}
    expect:
      rows:
        - {service_item_id: svc-1, hospital_id: hosp-1, service_item_identity_basis: specific_code, code_signature_specific: sig-s1, code_signature_all: sig-a2, representative_clean_description: "CT W CONTRAST ABDOMEN", first_seen_snapshot_id: snap-1, last_seen_snapshot_id: snap-2, snapshot_count: 2, source_item_count: 2, distinct_description_count: 2}
        - {service_item_id: svc-2, hospital_id: hosp-1, service_item_identity_basis: categorical_code, code_signature_specific: null, code_signature_all: sig-a3, representative_clean_description: "MISC SUPPLY", first_seen_snapshot_id: snap-2, last_seen_snapshot_id: snap-2, snapshot_count: 1, source_item_count: 1, distinct_description_count: 1}

  - name: payer_rate_methodology_amount_and_count_semantics
    description: >
      Fixture coverage for Silver Core payer-rate semantics: CMS methodology
      canonicalization, unmapped fallback, count bounds, amount-kind priority,
      and direct-vs-derived dollar comparability.
    model: slv_core__payer_rates
    given:
      - input: ref('slv_base__payer_rates')
        format: sql
        rows: |
          select *
          from (
              values
                  ('rate-fee-dollar', 'std-1', 'fee schedule', '0', 100.00::decimal(18, 4), null::double, null::varchar, null::decimal(18, 4), 'ppo'),
                  ('rate-percent-dollar', 'std-2', 'percent of total billed charges', '1 through 10', 75.00::decimal(18, 4), 60.0::double, '60% of gross', null::decimal(18, 4), 'hmo'),
                  ('rate-percentage-only', 'std-3', 'per diem', '11', null::decimal(18, 4), 80.0::double, null::varchar, null::decimal(18, 4), 'epo'),
                  ('rate-algorithm-only', 'std-4', 'other', 'bad count', null::decimal(18, 4), null::double, 'lesser of charges or fee schedule', null::decimal(18, 4), null::varchar),
                  ('rate-estimated-only', 'std-5', 'case rate', null::varchar, null::decimal(18, 4), null::double, null::varchar, 25.00::decimal(18, 4), null::varchar),
                  ('rate-empty', 'std-6', null::varchar, null::varchar, null::decimal(18, 4), null::double, null::varchar, null::decimal(18, 4), null::varchar),
                  ('rate-unmapped-dollar', 'std-7', 'custom method', '12', 42.00::decimal(18, 4), null::double, null::varchar, null::decimal(18, 4), null::varchar)
          ) as fixture(
              silver_payer_rate_id,
              silver_standard_charge_id,
              clean_methodology,
              raw_count,
              negotiated_dollar,
              negotiated_percentage,
              negotiated_algorithm,
              estimated_amount,
              clean_plan_name
          )
      - input: ref('slv_base__standard_charges')
        format: sql
        rows: |
          select *
          from (
              values
                  ('std-1', 'outpatient', 'facility'),
                  ('std-2', 'outpatient', 'facility'),
                  ('std-3', 'inpatient', 'facility'),
                  ('std-4', 'both', 'both'),
                  ('std-5', 'inpatient', 'professional'),
                  ('std-6', null::varchar, null::varchar),
                  ('std-7', 'outpatient', 'facility')
          ) as fixture(silver_standard_charge_id, clean_setting, clean_billing_class)
      - input: ref('slv_core__rate_modifier_signature')
        format: sql
        rows: |
          select
              null::varchar as silver_payer_rate_id,
              null::varchar as modifier_signature,
              null::integer as modifier_count
          where false
      - input: ref('slv_core__payer_alias_matches')
        format: sql
