        - {silver_charge_item_code_id: ndc_4_4_2, match_code: "01234567890", code_format_status: valid, code_cross_hospital_comparable: true, code_is_specific: true, canonical_ndc_11: "01234567890", ndc_format_status: padded_from_10_4_4_2}
        - {silver_charge_item_code_id: ndc_5_3_2, match_code: "12345067890", code_format_status: valid, code_cross_hospital_comparable: true, code_is_specific: true, canonical_ndc_11: "12345067890", ndc_format_status: padded_from_10_5_3_2}
        - {silver_charge_item_code_id: ndc_5_4_1, match_code: "12345678900", code_format_status: valid, code_cross_hospital_comparable: true, code_is_specific: true, canonical_ndc_11: "12345678900", ndc_format_status: padded_from_10_5_4_1}
