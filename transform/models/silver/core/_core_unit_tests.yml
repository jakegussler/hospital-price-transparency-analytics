version: 2

unit_tests:
  - name: charge_item_code_match_and_format_derivations
    description: >
      Fixture coverage for the Silver Core code enrichment: per-system
      zero-padding (revenue codes to 4, DRG family to 3, APC to 4 including
      over-padded 5-digit values), every NDC layout (canonical 11-digit,
      paddable 10-digit hyphenated 4-4-2 / 5-3-2 / 5-4-1, ambiguous
      unhyphenated, invalid layouts and lengths), generic match-key cleanup,
      format statuses, and the cross-hospital comparability flag.
    model: slv_core__charge_item_codes
    given:
      - input: ref('slv_base__charge_item_codes')
        format: sql
        rows: |
          select * from (
              values
                  ('rc_3digit', 'item-1', 'snap-1', 'hosp-1', 'json', 0, '450', '450', 'RC', 'rc', 'rc', 'json_code_information'),
                  ('rc_4digit', 'item-1', 'snap-1', 'hosp-1', 'json', 1, '0450', '0450', 'RC', 'rc', 'rc', 'json_code_information'),
                  ('msdrg_1digit', 'item-2', 'snap-1', 'hosp-1', 'json', 0, '5', '5', 'MS-DRG', 'ms-drg', 'ms-drg', 'json_code_information'),
                  ('trisdrg_2digit', 'item-2', 'snap-1', 'hosp-1', 'json', 1, '45', '45', 'TRIS-DRG', 'tris-drg', 'tris-drg', 'json_code_information'),
                  ('apc_3digit', 'item-3', 'snap-1', 'hosp-1', 'json', 0, '604', '604', 'APC', 'apc', 'apc', 'json_code_information'),
                  ('apc_overpadded', 'item-3', 'snap-1', 'hosp-1', 'json', 1, '05302', '05302', 'APC', 'apc', 'apc', 'json_code_information'),
                  ('ndc_4_4_2', 'item-4', 'snap-1', 'hosp-1', 'json', 0, '1234-5678-90', '1234-5678-90', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_5_3_2', 'item-4', 'snap-1', 'hosp-1', 'json', 1, '12345-678-90', '12345-678-90', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_5_4_1', 'item-4', 'snap-1', 'hosp-1', 'json', 2, '12345-6789-0', '12345-6789-0', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_11_hyphenated', 'item-4', 'snap-1', 'hosp-1', 'json', 3, '12345-6789-01', '12345-6789-01', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_11_plain', 'item-4', 'snap-1', 'hosp-1', 'json', 4, '12345678901', '12345678901', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_10_plain', 'item-4', 'snap-1', 'hosp-1', 'json', 5, '1234567890', '1234567890', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_5_5', 'item-4', 'snap-1', 'hosp-1', 'json', 6, '12345-67890', '12345-67890', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('ndc_8_digits', 'item-4', 'snap-1', 'hosp-1', 'json', 7, '12345678', '12345678', 'NDC', 'ndc', 'ndc', 'json_code_information'),
                  ('cdm_code', 'item-5', 'snap-1', 'hosp-1', 'csv_tall', 0, 'ABC 123', 'ABC 123', 'CDM', 'cdm', 'cdm', 'csv_charge_rows'),
                  ('local_code', 'item-5', 'snap-1', 'hosp-1', 'csv_tall', 1, 'pharm 001', 'pharm 001', 'LOCAL', 'local', 'local', 'csv_charge_rows'),
                  ('hcpcs_level2', 'item-6', 'snap-1', 'hosp-1', 'csv_tall', 0, 'J1100', 'J1100', 'HCPCS', 'hcpcs', 'hcpcs', 'csv_charge_rows'),
                  ('hcpcs_with_junk', 'item-6', 'snap-1', 'hosp-1', 'csv_tall', 1, 'J1100TC26', 'J1100TC26', 'HCPCS', 'hcpcs', 'hcpcs', 'csv_charge_rows'),
                  ('cpt_5digit', 'item-7', 'snap-1', 'hosp-1', 'csv_tall', 0, '99213', '99213', 'CPT', 'cpt', 'cpt', 'csv_charge_rows'),
                  ('cpt_pla', 'item-7', 'snap-1', 'hosp-1', 'csv_tall', 1, '0001U', '0001U', 'CPT', 'cpt', 'cpt', 'csv_charge_rows'),
                  ('missing_code', 'item-8', 'snap-1', 'hosp-1', 'json', 0, null, null, 'RC', 'rc', 'rc', 'json_code_information'),
                  ('missing_system', 'item-8', 'snap-1', 'hosp-1', 'json', 1, '123', '123', null, null, null, 'json_code_information'),
                  ('unknown_system', 'item-8', 'snap-1', 'hosp-1', 'json', 2, '456', '456', 'Mystery Code', 'mystery code', null, 'json_code_information')
          ) as fixture(
              silver_charge_item_code_id, silver_charge_item_id, snapshot_id,
