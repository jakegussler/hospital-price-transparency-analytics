        - {silver_charge_item_code_id: local_code, match_code: "PHARM001", code_format_status: not_validated, code_cross_hospital_comparable: false, code_is_specific: false, canonical_ndc_11: null, ndc_format_status: null}
        - {silver_charge_item_code_id: hcpcs_level2, match_code: "J1100", code_format_status: valid, code_cross_hospital_comparable: true, code_is_specific: true, canonical_ndc_11: null, ndc_format_status: null}
        - {silver_charge_item_code_id: hcpcs_with_junk, match_code: "J1100TC26", code_format_status: invalid_format, code_cross_hospital_comparable: true, code_is_specific: true, canonical_ndc_11: null, ndc_format_status: null}
