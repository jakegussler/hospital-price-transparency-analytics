version: 2

models:
  - name: slv_base__hospitals
    description: "Registry-backed hospital dimension used by the Silver foundation."
    columns:
      - name: hospital_id
        tests:
          - not_null
          - unique
      - name: canonical_state_name
        description: "State display label from the states seed."
      - name: canonical_state_type
        description: "State seed category such as state, district, territory, or freely associated state."
      - name: canonical_census_region
        description: "U.S. Census region for geographic rollups when available."
      - name: canonical_census_division
        description: "U.S. Census division for geographic rollups when available."

  - name: slv_base__hospital_snapshots
    description: "One row per ingested MRF snapshot with typed dates and registry metadata."
    columns:
      - name: snapshot_id
        tests:
          - not_null
          - unique
      - name: hospital_id
        tests:
          - not_null
      - name: source_format
        tests:
          - accepted_values:
              values: ["json", "csv_tall", "csv_wide"]
      - name: file_hash
        tests:
          - not_null

  - name: slv_base__hospital_locations
    description: "Source-reported hospital locations attached to Silver snapshots."
    columns:
      - name: silver_hospital_location_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - relationships:
              to: ref('slv_base__hospital_snapshots')
              field: snapshot_id

  - name: slv_base__type2_npis
    description: "Source-reported type-2 NPIs attached to Silver snapshots."
    columns:
      - name: silver_type2_npi_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - relationships:
              to: ref('slv_base__hospital_snapshots')
              field: snapshot_id

  - name: slv_base__csv_charge_row_items
    description: "Helper bridge from each CSV source row to its synthesized snapshot-scoped charge item."
    columns:
      - name: snapshot_id
        tests:
          - not_null
      - name: row_ordinal
        tests:
          - not_null
      - name: silver_charge_item_id
        tests:
          - not_null

  - name: slv_base__charge_items
    description: "Format-neutral item/service parent table for JSON and CSV sources."
    columns:
      - name: silver_charge_item_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_base__hospital_snapshots')
              field: snapshot_id
      - name: charge_item_signature
        tests:
          - not_null
      - name: parser_schema_family
        tests:
          - accepted_values:
              values: ["2.1", "2.2", "3.0"]

  - name: slv_base__standard_charges
    description: "Format-neutral charge context table with setting, billing class, generic amounts, grouped CSV context lineage, and source lineage."
    columns:
      - name: silver_standard_charge_id
        tests:
          - not_null
          - unique
      - name: silver_charge_item_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_base__charge_items')
              field: silver_charge_item_id
      - name: snapshot_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_base__hospital_snapshots')
              field: snapshot_id
      - name: source_format
        tests:
          - accepted_values:
              values: ["json", "csv_tall", "csv_wide"]
      - name: standard_charge_signature
        tests:
          - not_null

  - name: slv_base__charge_item_codes
    description: "Exploded billing codes attached to Silver charge items."
    columns:
      - name: silver_charge_item_code_id
        tests:
          - not_null
          - unique
      - name: silver_charge_item_id
        tests:
          - relationships:
              to: ref('slv_base__charge_items')
              field: silver_charge_item_id
      - name: canonical_code_system
        tests:
          - relationships:
              to: ref('cms_code_types')
              field: code_type

  - name: slv_base__payer_rates
    description: "Format-neutral payer and plan negotiated rate rows linked to grouped Silver standard charges."
    columns:
      - name: silver_payer_rate_id
        tests:
          - not_null
          - unique
      - name: silver_standard_charge_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_base__standard_charges')
              field: silver_standard_charge_id
      - name: silver_charge_item_id
        tests:
          - relationships:
              to: ref('slv_base__charge_items')
              field: silver_charge_item_id
      - name: parser_schema_family
        tests:
          - accepted_values:
              values: ["2.1", "2.2", "3.0"]
      - name: raw_plan_name
        description: "Source-reported plan name attached to this payer-rate row, preserved without normalization."
      - name: clean_plan_name
        description: "Deterministically cleaned lowercase plan name used for payer-context matching."
      - name: display_plan_name
        description: "Analyst-friendly title-case plan name derived from the source-reported plan name."

  - name: slv_base__modifiers
    description: "JSON modifier definitions and modifier payer metadata when available."
    columns:
      - name: silver_modifier_id
        tests:
          - not_null
          - unique
      - name: snapshot_id
        tests:
          - relationships:
              to: ref('slv_base__hospital_snapshots')
              field: snapshot_id

  - name: slv_base__charge_modifiers
    description: "Modifier codes attached to Silver standard-charge contexts, with payer-rate linkage where source grain provides it."
    columns:
      - name: silver_charge_modifier_id
        tests:
          - not_null
          - unique
      - name: silver_standard_charge_id
        tests:
          - not_null
          - relationships:
              to: ref('slv_base__standard_charges')
              field: silver_standard_charge_id
      - name: silver_payer_rate_id
        tests:
          - relationships:
              to: ref('slv_base__payer_rates')
              field: silver_payer_rate_id
      - name: modifier_definition_match_status
        tests:
          - accepted_values:
              values: ["resolved", "unresolved", "not_available_for_csv"]
