version: 2

unit_tests:
  - name: payer_rate_uses_parser_schema_family_for_versioned_conditionals
    description: >
      A JSON payer row from a v3.0-declared file can still be parsed as a v2.2
      record. Version-specific payer-rate rules should branch on the detected
      per-record parser family while preserving the reported header family.
    model: val__payer_rate_violations
    given:
      - input: source('bronze', 'payers_information')
        format: sql
        rows: |
          select
              'snapshot-parser-family' as snapshot_id,
              'standard-charge-1' as standard_charge_id,
              0 as payer_ordinal,
              'Acme Health' as payer_name,
              'PPO' as plan_name,
              'percent of total billed charges' as methodology,
              cast(null as varchar) as standard_charge_dollar,
              '80' as standard_charge_percentage,
              cast(null as varchar) as standard_charge_algorithm,
              cast(null as varchar) as estimated_amount,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes
      - input: source('bronze', 'standard_charges')
        format: sql
        rows: |
          select
              'snapshot-parser-family' as snapshot_id,
              'standard-charge-1' as standard_charge_id,
              'charge-item-1' as charge_item_id,
              cast(null as varchar) as additional_generic_notes
      - input: source('bronze', 'csv_charge_rows')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as source_format,
              cast(null as integer) as row_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              cast(null as varchar) as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
          where false
      - input: ref('stg_bronze__standard_charge_info')
        format: sql
        rows: |
          select
              'snapshot-parser-family' as snapshot_id,
              'charge-item-1' as charge_item_id,
              '3.0' as reported_schema_family,
              '2.2' as parser_schema_family
      - input: ref('stg_bronze__hospital_mrf_snapshots')
        format: sql
        rows: |
          select
              'snapshot-parser-family' as snapshot_id,
              'hospital-1' as hospital_id,
              'json' as source_format
      - input: ref('cms_validation_rules')
        format: sql
        rows: |
          select
              'v2_2_percentage_or_algorithm_requires_estimated_amount' as rule_id,
              'v2.2 estimate required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'v2.2 citation' as cms_citation
          union all
          select
              'v3_percentage_or_algorithm_requires_count' as rule_id,
              'v3 count required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'v3 citation' as cms_citation
    expect:
      rows:
        - snapshot_id: snapshot-parser-family
          source_format_family: json
          reported_schema_family: "3.0"
          source_charge_item_id: charge-item-1
          source_standard_charge_id: standard-charge-1
          payer_ordinal: 0
          rule_id: v2_2_percentage_or_algorithm_requires_estimated_amount
          column_name: estimated_amount
          diagnostic_type: conditional_required_field_missing

  - name: csv_item_only_row_emits_no_payer_rate_violations
    description: >
      A CSV item-only row (blank payer columns, no negotiated charge) is not a
      payer rate. The JSON-only identity/charge rules must not fire on CSV, and
      the conditional CSV CR1 rules require either a rate value or payer/plan
      identity to be present, so this row produces no payer-rate violations.
    model: val__payer_rate_violations
    given:
      - input: source('bronze', 'payers_information')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as integer) as payer_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_dollar,
              cast(null as varchar) as standard_charge_percentage,
              cast(null as varchar) as standard_charge_algorithm,
              cast(null as varchar) as estimated_amount,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes
          where false
      - input: source('bronze', 'standard_charges')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as additional_generic_notes
          where false
      - input: source('bronze', 'csv_charge_rows')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              0 as row_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              cast(null as varchar) as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
      - input: ref('stg_bronze__standard_charge_info')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as reported_schema_family,
              cast(null as varchar) as parser_schema_family
          where false
      - input: ref('stg_bronze__hospital_mrf_snapshots')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'hospital-1' as hospital_id,
              'csv' as source_format
      - input: ref('cms_validation_rules')
        format: sql
        rows: |
          select
              'payer_required_identity_and_methodology' as rule_id,
              'Payer identity required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'json citation' as cms_citation
          union all
          select
              'payer_requires_negotiated_charge' as rule_id,
              'Payer requires negotiated charge' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'json citation' as cms_citation
          union all
          select
              'csv_payer_identity_required_with_rate' as rule_id,
              'CSV payer identity required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'csv citation' as cms_citation
          union all
          select
              'csv_payer_rate_required_with_identity' as rule_id,
              'CSV payer charge required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'csv citation' as cms_citation
    expect:
      rows: []

  - name: csv_payer_rate_cr1_rules_are_csv_scoped_and_not_duplicated
    description: >
      CSV CR1 is bidirectional and conditional. A CSV row with a negotiated
      charge but no identity emits only csv_payer_identity_required_with_rate;
      a CSV row with payer/plan identity but no charge emits only
      csv_payer_rate_required_with_identity. The JSON-only rules must not
      double-fire on either row.
    model: val__payer_rate_violations
    given:
      - input: source('bronze', 'payers_information')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as integer) as payer_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_dollar,
              cast(null as varchar) as standard_charge_percentage,
              cast(null as varchar) as standard_charge_algorithm,
              cast(null as varchar) as estimated_amount,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes
          where false
      - input: source('bronze', 'standard_charges')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as additional_generic_notes
          where false
      - input: source('bronze', 'csv_charge_rows')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              0 as row_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              '100' as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              cast(null as varchar) as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
          union all
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              1 as row_ordinal,
              'Acme Health' as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              cast(null as varchar) as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
      - input: ref('stg_bronze__standard_charge_info')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as reported_schema_family,
              cast(null as varchar) as parser_schema_family
          where false
      - input: ref('stg_bronze__hospital_mrf_snapshots')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'hospital-1' as hospital_id,
              'csv' as source_format
      - input: ref('cms_validation_rules')
        format: sql
        rows: |
          select
              'payer_required_identity_and_methodology' as rule_id,
              'Payer identity required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'json citation' as cms_citation
          union all
          select
              'payer_requires_negotiated_charge' as rule_id,
              'Payer requires negotiated charge' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'json citation' as cms_citation
          union all
          select
              'csv_payer_identity_required_with_rate' as rule_id,
              'CSV payer identity required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'csv citation' as cms_citation
          union all
          select
              'csv_payer_rate_required_with_identity' as rule_id,
              'CSV payer charge required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'csv citation' as cms_citation
    expect:
      rows:
        - snapshot_id: snapshot-csv
          source_format_family: csv
          row_ordinal: 0
          rule_id: csv_payer_identity_required_with_rate
        - snapshot_id: snapshot-csv
          source_format_family: csv
          row_ordinal: 1
          rule_id: csv_payer_rate_required_with_identity

  - name: v3_dollar_bearing_rate_is_flagged_not_excluded
    description: >
      CSV Conditional Requirement 7 asks for count on percentage/algorithm rates,
      but a usable negotiated dollar is the comparable value. A 3.0 row that omits
      count yet carries a dollar (e.g. Fee Schedule) must NOT be excluded: it emits
      the non-excluding warn rule v3_algorithm_with_dollar_missing_count instead.
      Percentage/algorithm rows with no count AND no dollar are still excluded by
      v3_percentage_or_algorithm_requires_count.
    model: val__payer_rate_violations
    given:
      - input: source('bronze', 'payers_information')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as integer) as payer_ordinal,
              cast(null as varchar) as payer_name,
              cast(null as varchar) as plan_name,
              cast(null as varchar) as methodology,
              cast(null as varchar) as standard_charge_dollar,
              cast(null as varchar) as standard_charge_percentage,
              cast(null as varchar) as standard_charge_algorithm,
              cast(null as varchar) as estimated_amount,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes
          where false
      - input: source('bronze', 'standard_charges')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as standard_charge_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as additional_generic_notes
          where false
      - input: source('bronze', 'csv_charge_rows')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              0 as row_ordinal,
              'Acme Health' as payer_name,
              'PPO' as plan_name,
              'fee schedule' as methodology,
              '800' as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              'Fee Schedule' as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
          union all
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              1 as row_ordinal,
              'Acme Health' as payer_name,
              'PPO' as plan_name,
              'fee schedule' as methodology,
              cast(null as varchar) as standard_charge_negotiated_dollar,
              cast(null as varchar) as standard_charge_negotiated_percentage,
              'Fee Schedule' as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
          union all
          select
              'snapshot-csv' as snapshot_id,
              'csv' as source_format,
              2 as row_ordinal,
              'Acme Health' as payer_name,
              'HMO' as plan_name,
              'percent of total billed charges' as methodology,
              cast(null as varchar) as standard_charge_negotiated_dollar,
              '80' as standard_charge_negotiated_percentage,
              cast(null as varchar) as standard_charge_negotiated_algorithm,
              cast(null as varchar) as median_amount,
              cast(null as varchar) as tenth_percentile,
              cast(null as varchar) as ninetieth_percentile,
              cast(null as varchar) as count,
              cast(null as varchar) as additional_payer_notes,
              cast(null as varchar) as additional_generic_notes
      - input: ref('stg_bronze__standard_charge_info')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as charge_item_id,
              cast(null as varchar) as reported_schema_family,
              cast(null as varchar) as parser_schema_family
          where false
      - input: ref('stg_bronze__hospital_mrf_snapshots')
        format: sql
        rows: |
          select
              'snapshot-csv' as snapshot_id,
              'hospital-1' as hospital_id,
              'csv' as source_format
      - input: ref('cms_validation_rules')
        format: sql
        rows: |
          select
              'v3_percentage_or_algorithm_requires_count' as rule_id,
              'v3 count required' as rule_name,
              'error' as severity,
              'payer_rate' as grain,
              'exclude_entity' as disposition,
              'v3 citation' as cms_citation
          union all
          select
              'v3_algorithm_with_dollar_missing_count' as rule_id,
              'v3 count missing with dollar' as rule_name,
              'warn' as severity,
              'payer_rate' as grain,
              'report_only' as disposition,
              'v3 citation' as cms_citation
    expect:
      rows:
        - snapshot_id: snapshot-csv
          source_format_family: csv
          row_ordinal: 0
          rule_id: v3_algorithm_with_dollar_missing_count
          severity: warn
          excludes_from_silver: false
        - snapshot_id: snapshot-csv
          source_format_family: csv
          row_ordinal: 1
          rule_id: v3_percentage_or_algorithm_requires_count
          severity: error
          excludes_from_silver: true
        - snapshot_id: snapshot-csv
          source_format_family: csv
          row_ordinal: 2
          rule_id: v3_percentage_or_algorithm_requires_count
          severity: error
          excludes_from_silver: true

  - name: charge_item_schema_version_mismatch_warns_once
    description: >
      A JSON charge item whose accepted parser shape disagrees with the header
      version emits exactly one warn-severity charge-item violation.
    model: val__charge_item_violations
    given:
      - input: ref('stg_bronze__standard_charge_info')
        format: sql
        rows: |
          select
              'snapshot-schema-mismatch' as snapshot_id,
              'charge-item-1' as charge_item_id,
              'Mismatch item' as raw_description,
              'mismatch item' as clean_description,
              0 as item_ordinal,
              '3.0.0' as reported_schema_version,
              '3.0' as reported_schema_family,
              '2.2' as parser_schema_family,
              '2.2.1' as parser_schema_version,
              true as schema_version_mismatch
      - input: ref('stg_bronze__hospital_mrf_snapshots')
        format: sql
        rows: |
          select
              'snapshot-schema-mismatch' as snapshot_id,
              'hospital-1' as hospital_id,
              'json' as source_format
      - input: ref('stg_bronze__drug_information')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as charge_item_id,
              cast(null as double) as drug_unit,
              cast(null as varchar) as clean_drug_unit_type
          where false
      - input: ref('stg_bronze__code_information')
        format: sql
        rows: |
          select
              'snapshot-schema-mismatch' as snapshot_id,
              'charge-item-1' as charge_item_id,
              1 as code_ordinal,
              'cpt' as clean_code_type
      - input: ref('stg_bronze__standard_charges')
        format: sql
        rows: |
          select
              'snapshot-schema-mismatch' as snapshot_id,
              'charge-item-1' as charge_item_id,
              'standard-charge-1' as standard_charge_id
      - input: ref('stg_bronze__csv_charge_rows')
        format: sql
        rows: |
          select
              cast(null as varchar) as snapshot_id,
              cast(null as varchar) as source_format,
              cast(null as integer) as row_ordinal,
              cast(null as varchar) as raw_description,
              cast(null as varchar) as clean_description,
              cast(null as double) as drug_unit,
              cast(null as varchar) as clean_drug_unit_type,
              cast(null as varchar) as code_1,
              cast(null as varchar) as code_1_type,
              cast(null as decimal(18, 4)) as gross_charge,
              cast(null as decimal(18, 4)) as discounted_cash,
              cast(null as decimal(18, 4)) as negotiated_dollar,
              cast(null as double) as negotiated_percentage,
              cast(null as varchar) as negotiated_algorithm
          where false
      - input: ref('cms_code_types')
        format: sql
        rows: |
          select
              'cpt' as code_type,
              false as requires_drug_information
      - input: ref('cms_validation_rules')
        format: sql
        rows: |
          select
              'schema_version_header_record_mismatch' as rule_id,
              'Schema version header/record mismatch' as rule_name,
              'warn' as severity,
              'charge_item' as grain,
              'report_only' as disposition,
              'schema citation' as cms_citation
    expect:
      rows:
        - snapshot_id: snapshot-schema-mismatch
          source_format_family: json
          reported_schema_family: "3.0"
          source_charge_item_id: charge-item-1
          rule_id: schema_version_header_record_mismatch
          severity: warn
          grain: charge_item
          column_name: schema_version_mismatch
          diagnostic_type: schema_version_mismatch
          excludes_from_silver: false

  - name: charge_item_schema_version_mismatch_warn_does_not_reject
    description: >
      The schema-version mismatch rule is warn severity, so it must not produce
      a charge-item rejection key.
    model: val__charge_item_rejections
    given:
      - input: ref('val__all_violations')
        format: sql
        rows: |
          select
              'snapshot-schema-mismatch' as snapshot_id,
              'hospital-1' as hospital_id,
              'json' as source_format,
              'json' as source_format_family,
              'charge-item-1' as source_charge_item_id,
              cast(null as integer) as row_ordinal,
              'schema_version_header_record_mismatch' as rule_id,
              'warn' as severity,
              'report_only' as disposition,
              false as excludes_from_silver,
              'schema_version_mismatch' as diagnostic_type,
              'Header-declared schema version disagrees with the accepted parser shape for this JSON charge item.' as message,
              'charge_item' as grain
    expect:
      rows: []

