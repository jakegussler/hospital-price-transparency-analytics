version: 2

models:
  - name: gld_dim__hospital
    description: >
      Conformed hospital dimension. Grain: one row per hospital_id. Full-refresh
      table read unscoped from the registry-backed slv_base__hospitals (SCD type
      1, no history retained). canonical_census_region/division are the only
      market-geography attributes v1 ships; hospital_type and health_system are
      the peer-group dimensions the benchmarks use.
    columns:
      - name: hospital_id
        description: "Stable registry hospital identifier. Primary key."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('slv_base__hospitals')
                field: hospital_id
      - name: canonical_hospital_name
        description: "Registry display name for the hospital."
      - name: clean_canonical_hospital_name
        description: "Normalized hospital name for matching/joins."
      - name: canonical_state
        description: "Two-letter registry state code."
      - name: canonical_state_name
        description: "State display label from the states seed."
      - name: canonical_state_type
        description: "State seed category (state, district, territory, freely associated state)."
      - name: canonical_census_region
        description: "U.S. Census region for geographic rollups when available."
      - name: canonical_census_division
        description: "U.S. Census division for geographic rollups when available."
      - name: hospital_type
        description: "Registry hospital type; a peer-group dimension for benchmarks."
      - name: health_system
        description: "Parent health system; a peer-group dimension for benchmarks."
      - name: expected_format
        description: "Registry-declared MRF format for the hospital."
      - name: mrf_url
        description: "Registry-recorded machine-readable file URL."

  - name: gld_dim__snapshot
    description: >
      Conformed snapshot dimension. Grain: one row per snapshot_id. Full-refresh
      table read unscoped from slv_base__hospital_snapshots so it spans every
      snapshot even on a scoped run. Carries the time / lineage / currentness
      attributes that keep the rate-observation fact lean. In v1 it also holds the
      date attributes a separate gld_dim__date would own in a history-enabled
      build.
    columns:
      - name: snapshot_id
        description: "Snapshot identifier. Primary key."
        tests:
          - not_null
          - unique
      - name: hospital_id
        description: "Owning hospital. Foreign key to gld_dim__hospital."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gld_dim__hospital')
                field: hospital_id
      - name: source_format
        description: "Source MRF format for the snapshot."
        tests:
          - accepted_values:
              arguments:
                values: ["json", "csv_tall", "csv_wide"]
      - name: is_current_snapshot
        description: "True for the most recent snapshot per hospital (derived currentness)."
      - name: valid_from
        description: "Effective start (typed valid_from of the snapshot)."
      - name: valid_to
        description: "Effective end; null for the current snapshot."
      - name: published_last_updated_on
        description: "Hospital-published last-updated date for the MRF."
      - name: ingested_at
        description: "When the snapshot was ingested into Bronze."
      - name: schema_version
        description: "CMS MRF schema version declared by the source file."
      - name: source_url
        description: "Source MRF URL (lineage)."
      - name: source_file_name
        description: "Source MRF file name (lineage)."
      - name: file_hash
        description: "Content hash of the source file (lineage)."
        tests:
          - not_null
      - name: snapshot_age_days
        description: "current_date minus published_last_updated_on, in days; null when unpublished."
      - name: freshness_bucket
        description: "Coarse freshness band derived from snapshot_age_days."
        tests:
          - accepted_values:
              arguments:
                values: ["<=90d", "<=180d", "<=365d", ">365d", "unknown"]

  - name: gld_dim__payer
    description: >
      Conformed payer dimension. Grain: one row per canonical_payer_id. Source:
      the canonical_payers seed (the authoritative payer master), plus one
      explicit <unmatched> member so unmatched and standard-charge-scope
      observations can join without losing rows. Only stable payer attributes live
      here; observation-level context (market_segment, benefit_line, plan_type)
      stays on the fact.
    columns:
      - name: canonical_payer_id
        description: "Stable canonical payer identifier, or '<unmatched>' for the sentinel member. Primary key."
        tests:
          - not_null
          - unique
      - name: canonical_payer_name
        description: "Reviewed display name for the canonical payer."
        tests:
          - not_null
      - name: payer_parent_id
        description: "Parent organization identifier for corporate rollups; null for the unmatched member."
      - name: payer_parent_name
        description: "Parent organization display name; null for the unmatched member."
      - name: payer_type
        description: "Broad payer identity type, or 'unmatched' for the sentinel member."
        tests:
          - not_null
      - name: is_unmatched_member
        description: >
          True only for the synthetic <unmatched> sentinel. Per decision 0017 this
          member appears in coverage scorecards but must be excluded from payer
          benchmark math.
        tests:
          - not_null

  - name: gld_dim__service_code
    description: >
      Thin conformed service-code (code-cohort) dimension. Grain: one row per
      (canonical_code_system, match_code) observed among cross-hospital-comparable
      codes with a non-null match_code. service_code_key is the conformed cohort
      key the bridge and marts join on. Thin by design: v1 ships no external code
      descriptions or groupers (decision 0017 non-goal); this model is the
      conformed key plus the seam where enrichment later attaches descriptions and
      service families.
    columns:
      - name: service_code_key
        description: "md5(canonical_code_system || match_code). Conformed cohort key. Primary key."
        tests:
          - not_null
          - unique
      - name: canonical_code_system
        description: "Normalized code system (cpt, hcpcs, ndc, ms-drg, ...)."
        tests:
          - not_null
      - name: match_code
        description: "Normalized comparison code value within the code system."
        tests:
          - not_null
      - name: code_is_specific
        description: "True when the code system pins down a single item (whitelist; cdm/local/revenue/icd are not specific)."
      - name: code_cross_hospital_comparable
        description: "Always true here (membership filter); kept for explicit downstream filtering and readability."

  - name: gld_core__rate_observations
    description: >
      Atomic rate-observation fact. Grain: one row per reported amount cell =
      one (source charge/rate row, amount_kind) pair within one snapshot. The
      foundational Gold model and reconciliation backbone. It does NOT fan out on
      billing code: a standard charge contributes up to four observation rows
      (gross/cash/min/max) and a payer rate up to seven
      (dollar/percentage/algorithm/estimated/median/p10/p90). Code expansion
      lives in gld_bridge__rate_observation_code so this fact stays additive and
      double-count-proof. Snapshot-grained incremental (snapshot_replace on
      snapshot_id) reading its snapshot-grained inputs through hpt_scoped_ref.
      Most rows are true price observations; min/max bounds, percentages,
      algorithms, estimated and allowed-amount-stat values are retained for
      coverage but carry is_price_rankable = false.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - observation_scope
              - silver_standard_charge_id
              - silver_payer_rate_id
              - amount_kind
    columns:
      - name: gold_rate_observation_id
        description: "md5(observation_scope || source row id || amount_kind). Primary key."
        tests:
          - not_null
          - unique
      - name: snapshot_id
        description: "Owning snapshot. Foreign key to gld_dim__snapshot; scoping/partition key."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gld_dim__snapshot')
                field: snapshot_id
      - name: hospital_id
        description: "Owning hospital. Foreign key to gld_dim__hospital."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gld_dim__hospital')
                field: hospital_id
      - name: observation_scope
        description: "Which source produced the observation."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["standard_charge", "payer_rate"]
      - name: silver_standard_charge_id
        description: "Lineage to the standard charge the observation sits under (not null in both scopes)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('slv_base__standard_charges')
                field: silver_standard_charge_id
      - name: silver_charge_item_id
        description: "Lineage to the charge item; the bridge join key for code expansion."
        tests:
          - not_null
      - name: silver_payer_rate_id
        description: "Lineage to the payer rate; null for standard_charge scope."
        tests:
          - relationships:
              arguments:
                to: ref('slv_core__payer_rates')
                field: silver_payer_rate_id
      - name: source_format
        description: "Source MRF format (json/csv) for traceability."
      - name: amount_kind
        description: "The reported amount cell this row represents."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - gross_charge
                  - discounted_cash
                  - min_negotiated
                  - max_negotiated
                  - negotiated_dollar
                  - negotiated_percentage
                  - negotiated_algorithm
                  - estimated_amount
                  - median_amount
                  - p10_amount
                  - p90_amount
      - name: amount_role
        description: "Coarse role of the amount cell."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - gross
                  - cash
                  - bound
                  - negotiated
                  - estimated
                  - allowed_amount_stat
      - name: amount_unit
        description: "Unit of amount_value."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["usd", "percent", "text"]
      - name: amount_value
        description: "Numeric value for usd/percent units; null for the text (algorithm) kind."
      - name: raw_algorithm_value
        description: "Algorithm text for negotiated_algorithm; null otherwise."
      - name: is_price_rankable
        description: >
          The price-ranking gate (decision 0017, observation grain). True only for
          gross_charge, discounted_cash, and comparable_dollar negotiated_dollar.
        tests:
          - not_null
      - name: methodology
        description: "Payer-rate methodology; null for standard_charge scope."
      - name: amount_comparability_tier
        description: "Carried from Silver (payer-rate row level); null for standard_charge scope."
      - name: is_price_comparable
        description: "Carried from Silver (payer-rate row level); null for standard_charge scope."
      - name: count_min
        description: "Lower CMS count bound (payer-rate); null for standard_charge scope."
      - name: count_max
        description: "Upper CMS count bound (payer-rate); null for standard_charge scope."
      - name: clean_setting
        description: "Comparison context (degenerate dimension)."
      - name: clean_billing_class
        description: "Comparison context (degenerate dimension)."
      - name: modifier_signature
        description: "Sorted-set modifier signature for the charge; never aggregate across it."
        tests:
          - not_null
      - name: modifier_count
        description: "Distinct modifier codes on the charge."
        tests:
          - not_null
      - name: has_modifier
        description: "modifier_count > 0."
        tests:
          - not_null
      - name: has_pro_tech_split_modifier
        description: "Any 26/TC professional-technical split modifier on the charge; must isolate, never aggregate across."
        tests:
          - not_null
      - name: canonical_payer_id
        description: >
          Foreign key to gld_dim__payer. '<unmatched>' for payer-rate rows with no
          identity; null for standard_charge scope (no payer concept).
        tests:
          - relationships:
              arguments:
                to: ref('gld_dim__payer')
                field: canonical_payer_id
      - name: market_segment
        description: "Observation-level payer context; gates segment cuts downstream."
      - name: benefit_line
        description: "Observation-level payer context."
      - name: plan_type
        description: "Enrichment only; never gates inclusion."
      - name: plan_type_basis
        description: "Provenance of plan_type."
      - name: is_drug_observation
        description: "True when the charge item carries an NDC code and/or a drug unit type."
        tests:
          - not_null
      - name: canonical_drug_unit_type
        description: "Drug comparison context; null for non-drug items."
      - name: drug_unit_status
        description: "Most informative drug-unit status across the item (canonical > unknown_unit > missing_unit)."
      - name: is_current_snapshot
        description: "Convenience mirror of the snapshot dimension's currentness flag."
        tests:
          - not_null

  - name: gld_bridge__rate_observation_code
    description: >
      Code bridge for the rate-observation fact. Grain: one row per
      (gold_rate_observation_id, silver_charge_item_code_id) = one amount
      observation × each billing code on its charge item. Carries the many-to-many
      "code expansion" of decision 0017 outside the fact so the fact stays additive
      and double-count-proof. Does NOT filter to comparable/specific codes: it
      exposes the comparability flags so the coverage scorecard can count
      non-comparable codes and the comparison mart can apply the gate.
      service_code_key is populated only for cross-hospital-comparable codes with a
      non-null match_code (exactly the gld_dim__service_code membership) and is null
      otherwise. Snapshot-grained incremental (snapshot_replace on snapshot_id),
      same as the fact.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - gold_rate_observation_id
              - silver_charge_item_code_id
    columns:
      - name: gold_rate_observation_id
        description: "Foreign key to the rate-observation fact; grain component."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gld_core__rate_observations')
                field: gold_rate_observation_id
      - name: silver_charge_item_code_id
        description: "Lineage to the item-code row; grain component."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('slv_core__charge_item_codes')
                field: silver_charge_item_code_id
      - name: service_code_key
        description: >
          Foreign key to gld_dim__service_code (md5(canonical_code_system ||
          match_code)). Null for non-comparable or null-keyed codes, which are
          exposed here but never promoted to a cohort.
        tests:
          - relationships:
              arguments:
                to: ref('gld_dim__service_code')
                field: service_code_key
      - name: snapshot_id
        description: "Owning snapshot; scoping/partition key."
        tests:
          - not_null
      - name: hospital_id
        description: "Owning hospital (convenience)."
        tests:
          - not_null
      - name: canonical_code_system
        description: "Normalized code system, denormalized from the cohort key for readability."
        tests:
          - not_null
      - name: match_code
        description: "Normalized comparison code value; null where the source code has no match_code."
      - name: code_is_specific
        description: "Whether the code system pins down a single item (filter input — not applied here)."
        tests:
          - not_null
      - name: code_cross_hospital_comparable
        description: "Whether the code system is cross-hospital comparable (filter input — not applied here)."
        tests:
          - not_null
      - name: code_format_status
        description: "Source-faithful code format/quality status carried from Silver."
      - name: ndc_format_status
        description: "NDC-specific format status carried from Silver; null for non-NDC codes."
