version: 2

seeds:
  - name: hospitals
    description: "Registry-backed hospital metadata used to enrich Silver foundation snapshot rows."
    columns:
      - name: hospital_id
        description: "Stable project hospital identifier."
        tests:
          - not_null
          - unique
      - name: canonical_hospital_name
        description: "Reviewed hospital display name from the bundled registry."
        tests:
          - not_null
      - name: canonical_state
        description: "Two-letter state abbreviation from the registry."
        tests:
          - relationships:
              to: ref('states')
              field: state_code
      - name: hospital_type
        description: "Reviewed hospital type or facility category from the registry."
      - name: health_system
        description: "Reviewed health system or ownership group associated with the hospital, when known."
      - name: mrf_url
        description: "Registry source URL for the hospital machine-readable file."
      - name: expected_format
        description: "Expected source format used by the ingest pipeline."
        tests:
          - accepted_values:
              values: ["json", "csv_tall", "csv_wide"]

  - name: states
    description: "CMS-accepted two-letter state, district, territory, and freely associated state codes with analysis labels for geography rollups."
    columns:
      - name: state_code
        description: "Two-letter USPS-style code accepted by CMS hospital price transparency schemas."
        tests:
          - not_null
          - unique
      - name: state_name
        description: "Display label for the state, district, territory, or freely associated state."
        tests:
          - not_null
      - name: state_type
        description: "Geographic category for the code."
        tests:
          - not_null
          - accepted_values:
              values: ["state", "district", "territory", "freely_associated_state"]
      - name: census_region
        description: "U.S. Census region for the 50 states and District of Columbia; null for territories and freely associated states."
      - name: census_division
        description: "U.S. Census division for the 50 states and District of Columbia; null for territories and freely associated states."
      - name: is_50_state
        description: "Whether the code represents one of the 50 states."
        tests:
          - not_null
      - name: is_cms_accepted
        description: "Whether the code is accepted by the CMS hospital price transparency state-code list."
        tests:
          - not_null

  - name: cms_code_types
    description: "CMS-defined hospital price transparency code type values and standard names used for validation and canonical code-system labeling."
    columns:
      - name: code_type
        description: "Lowercase normalized code type value used for joins against cleaned source code-type fields."
        tests:
          - not_null
          - unique
      - name: cms_code_type
        description: "Official CMS code type value as encoded in hospital MRFs."
        tests:
          - not_null
          - unique
      - name: standard_name
        description: "CMS standard name for the code type."
        tests:
          - not_null
      - name: valid_in_2_1
        description: "Whether CMS schema family 2.1 allows this code type."
        tests:
          - not_null
      - name: valid_in_2_2
        description: "Whether CMS schema family 2.2 allows this code type."
        tests:
          - not_null
      - name: valid_in_3_0
        description: "Whether CMS schema family 3.0 allows this code type."
        tests:
          - not_null
      - name: requires_drug_information
        description: "Whether this code type triggers the CMS drug information requirement."
        tests:
          - not_null

  - name: canonical_payers
    description: "Reviewed broad payer identities used for Silver Core payer normalization. Product, program, segment, network, and benefit-line context lives in payer_context_rules."
    columns:
      - name: canonical_payer_id
        description: "Stable broad payer, payer brand, administrator, network, or licensee identifier."
        tests:
          - not_null
          - unique
      - name: canonical_payer_name
        description: "Reviewed display name for the broad payer identity."
        tests:
          - not_null
      - name: payer_parent_id
        description: "Stable parent organization identifier used for corporate rollups."
      - name: payer_parent_name
        description: "Reviewed parent organization display name."
      - name: payer_type
        description: "Broad payer identity type."
        tests:
          - accepted_values:
              values:
                - national_payer
                - regional_payer
                - payer_brand
                - marketplace_brand
                - bcbs_licensee
                - medicaid_mco_brand
                - dental_payer
                - vision_payer
                - behavioral_health_payer
                - government_program
                - network
                - tpa
                - product_brand
                - services_brand
                - other_payer
      - name: default_market_segment
        description: "Default market segment when the payer identity itself strongly implies one; otherwise unknown."
        tests:
          - accepted_values:
              values:
                - commercial
                - medicare_advantage
                - medicare_fee_for_service
                - medicaid_managed_care
                - medicaid_fee_for_service
                - exchange_marketplace
                - workers_comp
                - tricare_va
                - self_pay
                - other_government
                - other
                - unknown
      - name: default_benefit_line
        description: "Default benefit line for the payer identity when one is strongly implied."
        tests:
          - accepted_values:
              values: ["medical", "dental", "vision", "behavioral_health", "transplant", "unknown"]
      - name: active
        description: "Whether the canonical payer identity is active for current mapping joins."
      - name: evidence_source
        description: "Source category used to support the canonical payer identity, such as manual_review or an external reference."
      - name: evidence_url
        description: "URL for source-backed evidence when an external reference was used."
      - name: notes
        description: "Reviewer notes explaining the canonical payer identity or any important mapping caveats."

  - name: payer_aliases
    description: "Reviewed payer-name aliases. Accepted active rows map clean source payer names to broad canonical payer identities."
    columns:
      - name: payer_alias_id
        description: "Stable identifier for this reviewed payer alias rule."
        tests:
          - not_null
          - unique
      - name: canonical_payer_id
        description: "Broad canonical payer identity assigned when this alias rule matches."
        tests:
          - not_null
          - relationships:
              to: ref('canonical_payers')
              field: canonical_payer_id
      - name: example_raw_payer_name
        description: "Human-readable example of a source payer name represented by this alias rule."
      - name: clean_payer_name
        description: "Deterministically cleaned source payer name used for exact alias matching."
        tests:
          - not_null
      - name: alias_pattern
        description: "Pattern value represented by the rule; for exact-clean rules this matches clean_payer_name."
      - name: match_type
        description: "Matching method used by the rule."
        tests:
          - accepted_values:
              values: ["exact_clean"]
      - name: match_scope
        description: "Scope where this alias can be applied, such as global or state-specific."
        tests:
          - accepted_values:
              values: ["global", "state"]
      - name: canonical_state
        description: "Two-letter state required for state-scoped aliases; NA for global aliases."
      - name: validation_status
        description: "How the alias-to-payer mapping was validated."
        tests:
          - accepted_values:
              values: ["manual_exact", "manual_alias", "source_verified", "inferred_from_pattern"]
      - name: review_status
        description: "Review lifecycle status controlling whether the alias is eligible for canonical mapping."
        tests:
          - accepted_values:
              values: ["candidate", "accepted", "rejected", "needs_more_context"]
      - name: reviewed_by
        description: "Reviewer or process that last accepted or updated the alias decision."
      - name: reviewed_at
        description: "Date when the alias decision was reviewed."
      - name: active
        description: "Whether the alias rule is active for current Silver Core mapping joins."
      - name: evidence_source
        description: "Source category used to support the alias decision, such as manual_review or an external reference."
      - name: evidence_url
        description: "URL for source-backed evidence when an external reference was used."
      - name: notes
        description: "Reviewer notes explaining the alias decision, especially for non-exact or scoped mappings."

  - name: payer_context_rules
    description: "Reviewed payer and plan context rules. Accepted active rows enrich payer-rate rows with market, program, product, network, benefit-line, and state context without replacing canonical_payer_id."
    columns:
      - name: payer_context_rule_id
        description: "Stable identifier for this reviewed payer context rule."
        tests:
          - not_null
          - unique
      - name: source_canonical_payer_id
        description: "Broad canonical payer identity that must be resolved before this context rule can apply."
        tests:
          - not_null
          - relationships:
              to: ref('canonical_payers')
              field: canonical_payer_id
      - name: source_clean_payer_name
        description: "Optional clean payer name constraint used when a context rule should apply only to a specific alias."
      - name: plan_pattern
        description: "Clean plan-name text, regex, token, substring, or payer-name value used to identify the context."
        tests:
          - not_null
      - name: match_type
        description: "Matching method used by the rule."
        tests:
          - accepted_values:
              values: ["payer_name", "exact_clean", "plan_contains", "token_contains", "regex"]
      - name: match_scope
        description: "Scope where this context rule can be applied."
        tests:
          - accepted_values:
              values: ["global", "state"]
      - name: match_state
        description: "Two-letter state required for state-scoped rules."
      - name: priority
        description: "Lower numbers win when multiple context rules match."
        tests:
          - not_null
      - name: market_segment
        description: "Broad financing or coverage market classified from payer/plan context."
      - name: program_type
        description: "Specific government or product program context, such as dsnp, tenncare, medi_cal, or va_ccn."
      - name: product_or_network_name
        description: "Named product, network, or plan family that should not replace payer identity."
      - name: subsidiary_or_brand
        description: "More specific operating brand or subsidiary represented by the payer/plan context."
      - name: benefit_line
        description: "Benefit line such as dental, behavioral health, vision, transplant, or medical."
      - name: funding_arrangement
        description: "Funding arrangement when detectable, such as level_funded."
      - name: context_state
        description: "State implied by the payer/product/program context, especially Medicaid managed care programs."
      - name: plan_type
        description: "Plan type such as HMO, PPO, POS, or EPO when explicitly classified."
      - name: context_confidence
        description: "Reviewer confidence for the context classification."
        tests:
          - accepted_values:
              values: ["high", "medium", "low"]
      - name: validation_status
        description: "How the context rule was validated."
        tests:
          - accepted_values:
              values: ["manual_exact", "manual_alias", "source_verified", "inferred_from_pattern"]
      - name: review_status
        description: "Review lifecycle status controlling whether the context rule is eligible for matching."
        tests:
          - accepted_values:
              values: ["candidate", "accepted", "rejected", "needs_more_context"]
      - name: reviewed_by
        description: "Reviewer or process that last accepted or updated the context rule."
      - name: reviewed_at
        description: "Date when the context rule decision was reviewed."
      - name: active
        description: "Whether the context rule is active for current Silver Core matching joins."
      - name: evidence_source
        description: "Source category used to support the context decision, such as manual_review or an external reference."
      - name: evidence_url
        description: "URL for source-backed evidence when an external reference was used."
      - name: notes
        description: "Reviewer notes explaining why payer or plan context should receive these enrichment fields."
