name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra warehouse

      - name: Check formatting
        run: uv run ruff format --check src/ tests/ scripts/

      - name: Lint
        run: uv run ruff check src/ tests/ scripts/

      - name: Unit tests
        run: uv run pytest -m "not e2e"

      - name: dbt deps
        working-directory: transform
        run: uv run dbt deps --profiles-dir .

      - name: dbt compile
        working-directory: transform
        env:
          HPT_DUCKDB_PATH: ${{ runner.temp }}/hpt_compile.duckdb
        run: uv run dbt compile --profiles-dir .

  e2e-fixture:
    name: Offline e2e fixture
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra warehouse

      - name: Offline e2e fixture
        run: uv run pytest -m e2e
