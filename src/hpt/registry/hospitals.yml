# Hospital Price Transparency — Source Registry
#
# Each entry drives the downloader: hospital_id is the partition key,
# mrf_source.url is fetched, and mrf_source.expected_format tells
# downstream parsers which layout to expect.
#
# `active` controls the working pipeline set. Only active hospitals are
# downloaded/ingested in bulk, exported to the dbt hospitals seed, and resolved
# by the all-hospitals dbt run; inactive hospitals are retained here (URL
# research preserved) and can still be targeted explicitly by id. The active
# set is currently scoped to the Nashville, TN metro (see README / decision
# 0019). Reactivate or add hospitals by flipping `active` / adding entries.
#
# See docs/local/req_docs/source_registry_downloader.md for the registry shape.

hospitals:

  # ===========================================================================
  # ACTIVE — Nashville, TN metro corpus
  # ===========================================================================

